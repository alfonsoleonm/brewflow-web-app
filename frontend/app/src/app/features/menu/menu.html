<mat-drawer-container class="drawer-container">
    <mat-drawer #cartDrawer mode="over" position="end" class="cart-panel">
        <app-cart-drawer />
    </mat-drawer>

    <div class="page-container">
        <div class="menu-header">
            <div>
                <h1 class="bf-section-title">Menu</h1>
                <p class="bf-muted">Curated coffee, bakery, and food.</p>
            </div>

            <button mat-stroked-button class="cart-trigger" (click)="cartDrawer.toggle()">
                <mat-icon>shopping_bag</mat-icon>
                Cart ({{ cartCount }})
            </button>
        </div>

        <div class="category-filters">
            @for (category of categories; track category) {
            <button mat-stroked-button class="category-btn" [class.active]="selectedCategory() === category"
                (click)="selectCategory(category)">
                {{ category }}
            </button>
            }
        </div>

        <div class="products-grid">
            @for (product of filteredProducts(); track product.id) {
            <article class="bf-card product-card">
                <img [src]="product.imageUrl" [alt]="product.name" class="product-image"
                    (click)="openProductModal(product)" />

                <div class="product-content">
                    <div class="product-top">
                        <h3 (click)="openProductModal(product)">{{ product.name }}</h3>
                        <span class="price">${{ product.price }}</span>
                    </div>

                    <p class="bf-muted">{{ product.description }}</p>

                    <div class="product-footer">
                        <span class="category">{{ product.category }}</span>

                        @if (!product.available) {
                        <span class="unavailable">Unavailable</span>
                        } @else {
                        <button mat-flat-button (click)="addToCart(product)">
                            Add
                        </button>
                        }
                    </div>
                </div>
            </article>
            }
        </div>
    </div>
</mat-drawer-container>

<app-product-modal [product]="selectedProduct()" (closed)="closeProductModal()" />
